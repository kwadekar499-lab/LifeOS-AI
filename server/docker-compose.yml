version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: lifeos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos_password
      POSTGRES_DB: lifeos_db
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d lifeos_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lifeos-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lifeos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lifeos-network

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: lifeos-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://lifeos:lifeos_password@postgres:5432/lifeos_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRY: 7d
      BCRYPT_ROUNDS: 12
      CORS_ORIGIN: http://localhost:5173
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      MAX_REQUEST_SIZE: 10mb
      MAX_JSON_PAYLOAD: 5mb
      LOG_LEVEL: info
      HEALTH_CHECK_TIMEOUT: 5000
      SWAGGER_ENABLED: true
      SWAGGER_TITLE: LifeOS AI API
      SWAGGER_DESCRIPTION: LifeOS AI Backend API Documentation
      SWAGGER_VERSION: 1.0.0
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lifeos-network
    # Override for development - use start:dev instead of production CMD
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lifeos-network:
    driver: bridge